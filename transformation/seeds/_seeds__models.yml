version: 2

seeds:
  - name: seed_lead_status_map
    description: Static lookup mapping Salesforce lead statuses to display labels.
    columns:
      - name: lead_status
        description: Raw Salesforce lead status value — natural key.
        tests:
          - unique
          - not_null
      - name: status_label
        description: Human-readable display label.
        tests:
          - not_null
      - name: sort_order
        description: Integer sort order for reporting.
        tests:
          - unique
          - not_null

  - name: seed_opportunity_stage_map
    description: Static lookup mapping opportunity stage names to pipeline phases.
    columns:
      - name: stage_name
        description: Raw Salesforce stage name — natural key.
        tests:
          - unique
          - not_null
      - name: pipeline_phase
        description: High-level pipeline phase.
        tests:
          - not_null
          - accepted_values:
              values: ['Early', 'Mid', 'Late', 'Closed']
      - name: sort_order
        description: Integer sort order for funnel reporting.
        tests:
          - unique
          - not_null
